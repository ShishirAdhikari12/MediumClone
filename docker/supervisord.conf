[supervisord]
nodaemon=true

[program:laravel-setup]
command=sh -c "php artisan migrate --force && php artisan db:seed --force"
directory=/var/www/html
autostart=true
autorestart=false
priority=1

[program:php-fpm]
command=php-fpm
priority=10

[program:nginx]
command=nginx -g "daemon off;"
priority=20